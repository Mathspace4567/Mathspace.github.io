<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mathspace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="fixed-header">
    <nav class="topbar-anonymous">
        <div class="logo-container">
            <img alt="Mathspace" src="https://mathspace-production-static.mathspace.co/static/cache/b79f23b1077d57a50f6c10dc38374714cdd60f5b/img/core/mathspace.svg" style="width:144px;">
        </div>
        <div class="join-class-link">
            <a href="#">Join class</a>
        </div>
    </nav>
</div>

<div class="login-page">
    <div class="container">
        <h2 class="login-h2">Login</h2>

        <div class="form">
            <form id="login-form">
                <input type="text" id="id_username" class="form-control" placeholder="Username or Email" required>
                
                <div id="password-group" class="form-group" style="display:none;">
                    <input type="password" id="id_password" class="form-control" placeholder="Password" required>
                </div>

                <div class="row">
                    <div class="col-xs-6">
                        <label><input type="checkbox"> Remember me</label>
                    </div>
                    <div class="col-xs-6 text-right">
                        <a href="#" class="forgot-pw">Forgot password</a>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary">Continue</button>
            </form>
        </div>

        <div style="max-width:420px; margin:25px auto 0;">
            <a href="#" class="clever-login">Sign in with Clever</a>
        </div>
    </div>
</div>

<!-- Hidden Iframe Container -->
<div id="game-iframe-container" style="display:none; margin-top:40px; text-align:center;">
    <h2 style="color:#1ABC9C;">Welcome, Developer! Loading Games...</h2>
    <iframe id="game-iframe" width="100%" height="700px" style="border:2px solid #1ABC9C; border-radius:8px; max-width:1100px;" allowfullscreen></iframe>
    <br><br>
    <button onclick="backToLogin()" class="btn btn-primary">← Back to Login</button>
</div>

<script src="script.js"></script>
</body>
</html>
